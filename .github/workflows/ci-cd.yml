# CI pipeline for Frontend application
# This workflow automatically builds and deploys the frontend project to AWS S3

name: CI/CD - Frontend

# Controls when the workflow will run
on:
  # Trigger on push to the main branch
  push:
    branches: [ "main" ]
  # Trigger on pull requests targeting the main branch
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Manage concurrency to cancel previous runs of the same branch
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  ci:
    name: Lint & Build
    # Use Ubuntu latest runner provided by GitHub
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run linting check
      - name: Run lint
        run: npm run lint

      # Step 5: Build frontend application
      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy Frontend to S3
    # Use Ubuntu latest runner provided by GitHub
    runs-on: ubuntu-latest
    # Runs only if CI job passes
    needs: ci

    # Only run on push to main (not on PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build frontend application
      - name: Build frontend
        run: npm run build

      # Step 5: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 6: Sync build output (dist/) to S3 bucket
      - name: Deploy dist to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete